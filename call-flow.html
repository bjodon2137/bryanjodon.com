<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Support Call Guide — Bryan Jodon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f3f2ef;
    --panel: #ffffff;
    --border: #d1d5db;
    --text: #111827;
    --text-muted: #6b7280;
    --accent: #0052a5;
    --accent-light: #e8f0fb;
    --d-color: #b91c1c;
    --d-light: #fef2f2;
    --i-color: #b45309;
    --i-light: #fffbeb;
    --s-color: #047857;
    --s-light: #ecfdf5;
    --c-color: #1d4ed8;
    --c-light: #eff6ff;
    --video-color: #7c3aed;
    --video-light: #f5f3ff;
    --coaching-bg: #fff8e1;
    --coaching-border: #f59e0b;
    --watchfor-bg: #f0fdf4;
    --watchfor-border: #10b981;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-400: #9ca3af;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --video-color-dark: #6d28d9;
    --coaching-text: #78350f;
    --watchfor-text: #064e3b;
    --radius-sm: 5px;
    --radius: 8px;
    --radius-md: 10px;
    --radius-lg: 12px;
    --radius-pill: 20px;
    --shadow: 0 1px 3px rgba(0,0,0,0.10);
    --shadow-md: 0 3px 8px rgba(0,0,0,0.12);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.2);
    --shadow-modal: 0 10px 30px rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── HEADER ── */
  header {
    background: var(--accent);
    color: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.3px; }
  header span { font-size: 12px; opacity: 0.8; }
  .header-back {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    transition: color 0.15s;
    white-space: nowrap;
  }
  .header-back:hover { color: #fff; }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 16px;
    padding: 16px;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* ── SIDEBAR (left) ── */
  .sidebar-left {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .panel-header {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 11px 14px 9px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    background: transparent;
  }

  /* DISC selector */
  .disc-selector { padding: 12px; }
  .disc-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 9px 12px;
    border: 2px solid var(--border);
    border-radius: 6px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    transition: all 0.15s;
    text-align: left;
  }
  .disc-btn:last-child { margin-bottom: 0; }
  .disc-btn .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 13px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
  }
  .disc-btn.d-btn .badge { background: var(--d-color); }
  .disc-btn.i-btn .badge { background: var(--i-color); }
  .disc-btn.s-btn .badge { background: var(--s-color); }
  .disc-btn.c-btn .badge { background: var(--c-color); }
  .disc-btn.active.d-btn { border-color: var(--d-color); background: var(--d-light); }
  .disc-btn.active.i-btn { border-color: var(--i-color); background: var(--i-light); }
  .disc-btn.active.s-btn { border-color: var(--s-color); background: var(--s-light); }
  .disc-btn.active.c-btn { border-color: var(--c-color); background: var(--c-light); }
  .disc-btn:hover:not(.active) { border-color: var(--gray-400); background: var(--gray-50); }

  .disc-desc { font-size: 11px; color: var(--text-muted); line-height: 1.35; }

  /* Per-step DISC selection grid (main content) */
  .step-disc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .step-disc-tile {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 10px 12px 12px;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .step-disc-tile:hover:not(.selected) { border-color: var(--gray-400); background: var(--gray-50); }
  .step-disc-tile-head {
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .step-disc-tile .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
  }
  .step-disc-tile-name { font-size: 12px; font-weight: 800; }
  .step-disc-tile.d-tile .badge { background: var(--d-color); }
  .step-disc-tile.d-tile .step-disc-tile-name { color: var(--d-color); }
  .step-disc-tile.i-tile .badge { background: var(--i-color); }
  .step-disc-tile.i-tile .step-disc-tile-name { color: var(--i-color); }
  .step-disc-tile.s-tile .badge { background: var(--s-color); }
  .step-disc-tile.s-tile .step-disc-tile-name { color: var(--s-color); }
  .step-disc-tile.c-tile .badge { background: var(--c-color); }
  .step-disc-tile.c-tile .step-disc-tile-name { color: var(--c-color); }
  .step-disc-tile.selected.d-tile { border-color: var(--d-color); background: var(--d-light); }
  .step-disc-tile.selected.i-tile { border-color: var(--i-color); background: var(--i-light); }
  .step-disc-tile.selected.s-tile { border-color: var(--s-color); background: var(--s-light); }
  .step-disc-tile.selected.c-tile { border-color: var(--c-color); background: var(--c-light); }
  .step-disc-tile-script {
    font-size: 11px;
    line-height: 1.45;
    color: var(--gray-600);
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  @media (max-width: 700px) {
    .step-disc-grid { grid-template-columns: 1fr; }
  }

  /* Step 0 — Reading the Room cards, now inline in main content */
  .step0-disc-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 700px) {
    .step0-disc-cards { grid-template-columns: 1fr; }
  }



  /* Print btn */
  .print-btn {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    letter-spacing: 0.2px;
  }
  .print-btn:hover { background: #003d80; }

  /* ── MAIN CONTENT ── */
  .main-content { display: flex; flex-direction: column; gap: 12px; }

  /* Service toggle */
  .service-toggle {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow);
  }
  .service-toggle span { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .toggle-btn {
    padding: 6px 18px;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .toggle-btn.active-internet { border-color: var(--accent); background: var(--accent); color: #fff; }
  .toggle-btn.active-video { border-color: var(--video-color); background: var(--video-color); color: #fff; }
  .toggle-btn.active-all { border-color: var(--accent); background: var(--accent); color: #fff; }
  .toggle-btn:not(.active-internet):not(.active-video):not(.active-all):hover { border-color: var(--gray-400); background: var(--gray-50); }
  .toggle-sep { color: var(--border); font-size: 18px; }
  .step-count-badge {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--gray-100);
    border-radius: 12px;
    padding: 3px 10px;
  }

  /* Steps list */
  .steps-list { display: flex; flex-direction: column; gap: 10px; }

  .step-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .step-card:hover { box-shadow: var(--shadow-md); }
  .step-card.hidden { display: none; }

  .step-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    background: #f9f8f6;
    border-bottom: 1px solid var(--border);
  }
  .step-header:hover { background: #f1f0ed; }
  .step-header:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

  .step-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .step-num.video-num { background: var(--video-color); }

  .step-title { font-size: 14px; font-weight: 700; flex: 1; }

  .step-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .tag-internet { background: #dbeafe; color: var(--c-color); }
  .tag-video { background: var(--video-light); color: var(--video-color-dark); }
  .tag-both { background: #dcfce7; color: #15803d; }

  .step-chevron {
    font-size: 12px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .step-card.open .step-chevron { transform: rotate(180deg); }

  .step-body { display: none; padding: 14px; }
  .step-card.open .step-body { display: block; }

  .step-description {
    font-size: 13px;
    color: var(--gray-700);
    line-height: 1.6;
    margin-bottom: 12px;
    padding: 10px 12px;
    background: #fafaf9;
    border-left: 3px solid var(--accent);
    border-radius: 0 4px 4px 0;
  }
  .step-description.video-desc { border-left-color: var(--video-color); }

  /* Script output */
  .script-output { margin-top: 8px; }

  .script-output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
  }
  .disc-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .disc-label.D { background: var(--d-light); color: var(--d-color); border: 1px solid var(--d-color); }
  .disc-label.I { background: var(--i-light); color: var(--i-color); border: 1px solid var(--i-color); }
  .disc-label.S { background: var(--s-light); color: var(--s-color); border: 1px solid var(--s-color); }
  .disc-label.C { background: var(--c-light); color: var(--c-color); border: 1px solid var(--c-color); }

  .copy-btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: #fff;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .copy-btn.copied { border-color: var(--s-color); color: var(--s-color); background: var(--s-light); }

  .script-text {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.65;
    color: var(--gray-800);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
  }

  /* Coaching note */
  .coaching-note {
    margin-top: 10px;
    padding: 10px 12px 10px 14px;
    background: var(--coaching-bg);
    border-left: 4px solid var(--coaching-border);
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: var(--coaching-text);
    line-height: 1.5;
  }
  .coaching-note strong {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #92400e;
    margin-bottom: 3px;
  }

  /* Watch for */
  .watch-for {
    margin-top: 8px;
    padding: 10px 12px 10px 14px;
    background: var(--watchfor-bg);
    border-left: 4px solid var(--watchfor-border);
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: var(--watchfor-text);
    line-height: 1.5;
  }
  .watch-for strong {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #065f46;
    margin-bottom: 3px;
  }

  /* Misread recovery banner — shown once when a step's DISC type shifts mid-call */
  .misread-banner {
    margin-bottom: 10px;
    padding: 9px 12px;
    background: #ede9fe;
    border-left: 4px solid var(--video-color);
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: #4c1d95;
    line-height: 1.5;
    font-weight: 600;
  }



  .disc-card {
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .disc-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 700;
  }
  .disc-card-header .badge {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    color: #fff;
  }
  .disc-card.D .disc-card-header { background: var(--d-light); color: var(--d-color); border-bottom: 1px solid #fca5a5; }
  .disc-card.D .disc-card-header .badge { background: var(--d-color); }
  .disc-card.I .disc-card-header { background: var(--i-light); color: var(--i-color); border-bottom: 1px solid #fcd34d; }
  .disc-card.I .disc-card-header .badge { background: var(--i-color); }
  .disc-card.S .disc-card-header { background: var(--s-light); color: var(--s-color); border-bottom: 1px solid #6ee7b7; }
  .disc-card.S .disc-card-header .badge { background: var(--s-color); }
  .disc-card.C .disc-card-header { background: var(--c-light); color: var(--c-color); border-bottom: 1px solid #bfdbfe; }
  .disc-card.C .disc-card-header .badge { background: var(--c-color); }

  .disc-card-body { padding: 10px 12px; background: #fff; }
  .disc-signal {
    font-size: 12px;
    color: var(--gray-700);
    line-height: 1.5;
    padding: 4px 0;
    border-bottom: 1px solid var(--gray-100);
  }
  .disc-signal:last-child { border-bottom: none; }
  .disc-signal::before { content: "• "; color: var(--text-muted); }

  /* ── PRINT VIEW ── */
  #print-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    overflow: auto;
  }
  #print-overlay.visible { display: block; }
  .print-container {
    background: #fff;
    max-width: 780px;
    margin: 30px auto;
    padding: 36px 48px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
  }
  .print-close-btn {
    position: sticky;
    top: 10px;
    float: right;
    padding: 6px 14px;
    background: var(--d-color);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
  }
  .print-title {
    font-size: 20px;
    font-weight: 800;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .print-subtitle {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }
  .print-step { margin-bottom: 22px; page-break-inside: avoid; }
  .print-step-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 2px solid var(--accent);
  }
  .print-step-title.video-title { border-bottom-color: var(--video-color); }
  .print-script {
    font-size: 13px;
    font-weight: 700;
    line-height: 1.7;
    color: var(--gray-800);
    margin-bottom: 6px;
  }
  .print-coaching {
    font-size: 11px;
    color: var(--coaching-text);
    padding: 6px 10px;
    background: var(--coaching-bg);
    border-left: 3px solid var(--coaching-border);
    margin-top: 4px;
  }
  .print-watch {
    font-size: 11px;
    color: var(--watchfor-text);
    padding: 6px 10px;
    background: var(--watchfor-bg);
    border-left: 3px solid var(--watchfor-border);
    margin-top: 4px;
  }
  .print-empty { font-size: 13px; color: var(--text-muted); font-style: italic; }
  .print-disc-used {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--text-muted);
    margin-left: 8px;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1px 7px;
  }

  /* ── RECLASSIFY CHOOSER (per-step) ── */
  .reclass-strip {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
    padding: 8px 10px;
    background: var(--gray-50);
    border: 1px dashed var(--border);
    border-radius: 6px;
  }
  .reclass-prompt {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    margin-right: 2px;
  }
  .reclass-current {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 10px;
    cursor: default;
  }
  .reclass-current-D { background: var(--d-light); color: var(--d-color); border: 1px solid var(--d-color); }
  .reclass-current-I { background: var(--i-light); color: var(--i-color); border: 1px solid var(--i-color); }
  .reclass-current-S { background: var(--s-light); color: var(--s-color); border: 1px solid var(--s-color); }
  .reclass-current-C { background: var(--c-light); color: var(--c-color); border: 1px solid var(--c-color); }
  .reclass-option {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
    cursor: pointer;
    background: #fff;
    transition: all 0.15s;
  }
  .reclass-option.reclass-D { border: 1px solid var(--d-color); color: var(--d-color); }
  .reclass-option.reclass-D:hover { background: var(--d-light); }
  .reclass-option.reclass-I { border: 1px solid var(--i-color); color: var(--i-color); }
  .reclass-option.reclass-I:hover { background: var(--i-light); }
  .reclass-option.reclass-S { border: 1px solid var(--s-color); color: var(--s-color); }
  .reclass-option.reclass-S:hover { background: var(--s-light); }
  .reclass-option.reclass-C { border: 1px solid var(--c-color); color: var(--c-color); }
  .reclass-option.reclass-C:hover { background: var(--c-light); }
  .reclass-other {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 10px;
    cursor: pointer;
    background: var(--gray-100);
    color: var(--text-muted);
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .reclass-other:hover { background: var(--gray-200); }
  .reclass-other.noted { background: var(--gray-200); color: var(--gray-700); border-color: var(--gray-400); }
  .reclass-pending {
    font-size: 12px;
    color: var(--text-muted);
    font-style: italic;
    padding: 8px 2px;
  }

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
// Fixed DISC wheel adjacency — do not deviate. Opposite types are never
// offered as a one-click option; that big a mismatch needs a manual reset.
//   D(red) adj I,C · I(yellow) adj D,S · S(green) adj I,C · C(blue) adj D,S
const ADJACENCY = { D: ['I','C'], I: ['D','S'], S: ['I','C'], C: ['D','S'] };
const DISC_NAMES = {D: 'Dominant', I: 'Influential', S: 'Steady', C: 'Conscientious'};

const MISREAD_RECOVERY = {
  "D": "Got it — switching gears. I'll keep this quick and skip ahead to what matters.",
  "I": "Ah, gotcha — let's recalibrate. I'll walk through this with you a little differently.",
  "S": "No problem at all — let's slow down and take this at whatever pace works for you.",
  "C": "Understood — adjusting my approach. I'll be more precise about the next few steps."
};

let currentDisc = null;     // active read; null = no read picked yet (pre-step-1 state)
let currentFilter = 'all';
let stepTypeLog = {};       // stepId -> DISC type active when that step was last touched
let breadcrumbLog = [];     // [{label, type, kind: 'initial'|'shift'|'override'|'other', note?}]
let openSteps = new Set();  // stepIds currently expanded — preserved across re-renders
let misreadStepId = null;   // stepId currently showing the misread-recovery banner — in-memory only, not persisted

// Storage helpers — persist the read, the path taken, and per-step state
function storeSave(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
}
function storeLoad(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw !== null ? JSON.parse(raw) : fallback;
  } catch(e) { return fallback; }
}
function persistState() {
  storeSave('activeType', currentDisc);
  storeSave('stepTypeLog', stepTypeLog);
  storeSave('breadcrumbLog', breadcrumbLog);
}
function stepLabel(step) {
  return (step.type === 'video' ? '📺 V' : '🌐 ') + step.seq;
}

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
function renderStep0() {

function renderSteps() {
  const container = document.getElementById('steps-list');
  container.innerHTML = '';
  container.appendChild(renderStep0());

  let visible = 0;
  STEPS.forEach(step => {
    const show = currentFilter === 'all' || step.type === currentFilter;
    const card = document.createElement('div');
    card.className = 'step-card' + (show ? '' : ' hidden');
    card.id = `card-${step.id}`;
    if (show) visible++;

    const isVideo = step.type === 'video';
    const tagLabel = step.type === 'both' ? 'Both' : (isVideo ? 'Video' : 'Internet');
    const tagClass = step.type === 'both' ? 'tag-both' : (isVideo ? 'tag-video' : 'tag-internet');

    card.className += openSteps.has(step.id) ? ' open' : '';

    card.innerHTML = `
      <div class="step-header" role="button" tabindex="0" onclick="toggleCard('${step.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleCard('${step.id}')}">
        <span class="step-num ${isVideo ? 'video-num' : ''}">${isVideo ? 'V' : ''}${step.seq}</span>
        <span class="step-title">${step.title}</span>
        <span class="step-tag ${tagClass}">${tagLabel}</span>
        <span class="step-chevron">▼</span>
      </div>
      <div class="step-body" id="body-${step.id}">
        <div class="step-description ${isVideo ? 'video-desc' : ''}">${step.description}</div>
        ${renderStepDiscArea(step)}
      </div>`;

    container.appendChild(card);
  });

  document.getElementById('step-count').textContent = `${visible} steps`;
}

// ─────────────────────────────────────────────
//  PER-STEP 2x2 DISC GRID — pick the read for this step, advance to next
// ─────────────────────────────────────────────
function renderStepDiscArea(step) {
  const chosen = stepTypeLog[step.id] || null;

  const tiles = ['D','I','S','C'].map(d => {
    const data = SCRIPTS[d] && SCRIPTS[d][step.id];
    const preview = data ? escHtml(data.script) : '';
    const sel = chosen === d ? ' selected' : '';
    return `
      <button class="step-disc-tile ${d.toLowerCase()}-tile${sel}" onclick="pickStepType('${step.id}','${d}')">
        <span class="step-disc-tile-head">
          <span class="badge">${d}</span>
          <span class="step-disc-tile-name">${DISC_NAMES[d]}</span>
        </span>
        <span class="step-disc-tile-script">${preview}</span>
      </button>`;
  }).join('');

  let detail = '';
  if (chosen) {
    const data = SCRIPTS[chosen][step.id];
    const banner = (misreadStepId === step.id && MISREAD_RECOVERY[chosen])
      ? `<div class="misread-banner">🔄 ${escHtml(MISREAD_RECOVERY[chosen])}</div>`
      : '';
    detail = `
      ${banner}
      <div class="script-output">
        <div class="script-output-header">
          <span class="disc-label ${chosen}">${chosen} — ${DISC_NAMES[chosen]}</span>
          <button class="copy-btn" onclick="copyScript('${step.id}', this)">📋 Copy Script</button>
        </div>
        <div class="script-text" id="script-text-${step.id}">${escHtml(data.script)}</div>
        ${data.coaching_note ? `<div class="coaching-note"><strong>💬 Delivery Note</strong>${escHtml(data.coaching_note)}</div>` : ''}
        ${data.watch_for ? `<div class="watch-for"><strong>👂 Listen For</strong>${escHtml(data.watch_for)}</div>` : ''}
      </div>`;
  }

  return `<div class="step-disc-grid">${tiles}</div>${detail}`;
}

function pickStepType(stepId, type) {
  const step = STEPS.find(s => s.id === stepId);
  const isInitial = currentDisc === null && !stepTypeLog[stepId];
  const changed = stepTypeLog[stepId] !== type;
  const prevDisc = currentDisc;

  stepTypeLog[stepId] = type;
  currentDisc = type;

  // Mid-call reclassification: the type just picked differs from the type
  // that was active going into this step. Surface a one-line recovery banner
  // on this step only — it's a live-call UI aid, not stored data.
  misreadStepId = (prevDisc && prevDisc !== type) ? stepId : null;

  ['D','I','S','C'].forEach(d => {
    const btn = document.getElementById(`btn-${d}`);
    if (btn) btn.classList.toggle('active', d === type);
  });

  if (changed) {
    breadcrumbLog.push({ label: stepLabel(step), type, kind: isInitial ? 'initial' : 'shift' });
  }

  // Flow to the next visible step in the call flow.
  const idx = STEPS.findIndex(s => s.id === stepId);
  let nextId = null;
  for (let i = idx + 1; i < STEPS.length; i++) {
    const s = STEPS[i];
    if (currentFilter === 'all' || s.type === currentFilter) { nextId = s.id; break; }
  }
  if (nextId) openSteps.add(nextId);

  persistState();
  renderSteps();
  updateProgress();
  renderBreadcrumb();
  // No auto-scroll: the next step opens already-expanded below the current
  // one, but navigation stays put so you can read coaching/watch_for while
  // delivering the current line, then scroll down at your own pace.
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb-trail');
  if (!el) return;
  if (!breadcrumbLog.length) {
    el.innerHTML = 'No read selected yet.';
    return;
  }
  el.innerHTML = breadcrumbLog.map(e => {
    if (e.kind === 'other') {
      return `<div class="breadcrumb-row breadcrumb-other">${e.label}: <span class="bc-type bc-${e.type}">${e.type}</span> <span class="bc-kind">other noted</span>${e.note ? ' — "' + escHtml(e.note) + '"' : ''}</div>`;
    }
    const verb = e.kind === 'initial' ? 'start' : (e.kind === 'override' ? 'override' : 'shift');
    return `<div class="breadcrumb-row">${e.label}: <span class="bc-type bc-${e.type}">${e.type}</span> <span class="bc-kind">(${verb})</span></div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

let _confirmResolve = null;
function showConfirm(message) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    document.getElementById('confirm-message').textContent = message;
    document.getElementById('confirm-overlay').classList.remove('hidden');
  });
}
function confirmResolve(result) {
  document.getElementById('confirm-overlay').classList.add('hidden');
  if (_confirmResolve) { _confirmResolve(result); _confirmResolve = null; }
}

async function resetRead() {
  const ok = await showConfirm('Start a new call? This clears your current read and path history — it can\'t be undone.');
  if (!ok) return;
  currentDisc = null;
  stepTypeLog = {};
  breadcrumbLog = [];
  misreadStepId = null;
  openSteps.clear();
  openSteps.add('step-0');
  if (STEPS.length) openSteps.add(STEPS[0].id);
  persistState();
  renderSteps();
  updateProgress();
  renderBreadcrumb();
}


function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleCard(stepId) {
  if (openSteps.has(stepId)) openSteps.delete(stepId); else openSteps.add(stepId);
  document.getElementById(`card-${stepId}`).classList.toggle('open');
}

function updateProgress() {
  const el = document.getElementById('progress-info');
  el.textContent = currentDisc
    ? `Current read: ${DISC_NAMES[currentDisc]} (${currentDisc}) · ${STEPS.length} steps`
    : 'Pick a read to begin';
}

// ─────────────────────────────────────────────
//  FILTER SELECTION
// ─────────────────────────────────────────────
function filterService(type) {
  currentFilter = type;
  ['all','internet','video'].forEach(t => {
    const btn = document.getElementById(`toggle-${t}`);
    btn.className = 'toggle-btn';
    if (t === type) {
      if (t === 'video') btn.className += ' active-video';
      else btn.className += ' active-all';
    }
  });
  renderSteps();
}

// ─────────────────────────────────────────────
//  COPY SCRIPT
// ─────────────────────────────────────────────
function copyScript(stepId, btn) {
  const el = document.getElementById(`script-text-${stepId}`);
  if (!el) return;
  const text = el.textContent || el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1800);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy Script'; btn.classList.remove('copied'); }, 1800);
  });
}

// ─────────────────────────────────────────────
//  PRINT / EXPORT
// ─────────────────────────────────────────────
function getStepType(step) {
  return stepTypeLog[step.id] || currentDisc;
}

function openPrint() {
  if (!currentDisc) {
    alert('Pick a read for at least one step before exporting.');
    return;
  }

  document.getElementById('print-title').textContent = 'DISC Call Script — Adaptive Read';

  const pathSummary = breadcrumbLog.length
    ? breadcrumbLog.map(e => `${e.label}: ${e.type}${e.kind === 'other' ? ' (note)' : ''}`).join('  →  ')
    : `Single read: ${DISC_NAMES[currentDisc]} (${currentDisc})`;

  document.getElementById('print-subtitle').innerHTML =
    `${new Date().toLocaleDateString()} · ${currentFilter === 'all' ? 'Internet + Video steps' : currentFilter + ' steps only'}` +
    `<br><span style="font-size:11px;">Path taken: ${escHtml(pathSummary)}</span>`;

  const body = document.getElementById('print-body');
  body.innerHTML = '';

  const steps = currentFilter === 'all' ? STEPS : STEPS.filter(s => s.type === currentFilter);
  const iSteps = steps.filter(s => s.type === 'internet');
  const vSteps = steps.filter(s => s.type === 'video');

  function renderGroup(title, stepList, isVideo) {
    if (!stepList.length) return;
    const h = document.createElement('h2');
    h.style.cssText = `font-size:15px;font-weight:800;color:${isVideo ? 'var(--video-color-dark)' : 'var(--accent)'};margin:20px 0 10px;padding-bottom:6px;border-bottom:2px solid ${isVideo ? 'var(--video-color)' : 'var(--accent)'}`;
    h.textContent = title;
    body.appendChild(h);

    stepList.forEach(step => {
      const type = getStepType(step);
      const data = type && SCRIPTS[type] && SCRIPTS[type][step.id];
      const div = document.createElement('div');
      div.className = 'print-step';
      div.innerHTML = `
        <div class="print-step-title ${isVideo ? 'video-title' : ''}">${isVideo ? 'V' : ''}${step.seq}. ${step.title}${type ? `<span class="print-disc-used">${type} — ${DISC_NAMES[type]}</span>` : ''}</div>
        ${data
          ? `<div class="print-script">${escHtml(data.script)}</div>
             ${data.coaching_note ? `<div class="print-coaching"><strong>Delivery:</strong> ${escHtml(data.coaching_note)}</div>` : ''}
             ${data.watch_for ? `<div class="print-watch"><strong>Listen For:</strong> ${escHtml(data.watch_for)}</div>` : ''}`
          : `<div class="print-empty">No script — this step wasn't answered during the call.</div>`
        }`;
      body.appendChild(div);
    });
  }

  renderGroup('🌐 Internet Repair', iSteps, false);
  renderGroup('📺 Video / Cable TV Repair', vSteps, true);

  document.getElementById('print-overlay').classList.add('visible');
}

function closePrint() {
  document.getElementById('print-overlay').classList.remove('visible');
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
function init() {
  currentDisc = storeLoad('activeType', null);
  stepTypeLog = storeLoad('stepTypeLog', {});
  breadcrumbLog = storeLoad('breadcrumbLog', []);

  if (openSteps.size === 0 && STEPS.length) {
    openSteps.add('step-0');
    const firstUnanswered = STEPS.find(s => !stepTypeLog[s.id]);
    openSteps.add(firstUnanswered ? firstUnanswered.id : STEPS[0].id);
  }

  renderSteps();
  updateProgress();
  renderBreadcrumb();
}

init();
</script>
</body>
</html>
