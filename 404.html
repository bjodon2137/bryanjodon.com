<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Bryan Jodon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf9; --border: #e5e3df; --text: #18181b; --muted: #71717a;
      --serif: 'DM Serif Display', Georgia, serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --pad: clamp(1.25rem, 5vw, 3rem);
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
    nav { border-bottom: 1px solid var(--border); padding: 0 var(--pad); height: 56px; display: flex; align-items: center; }
    .nav-brand { font-family: var(--serif); font-size: 1.1rem; color: var(--text); text-decoration: none; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: var(--pad); }
    .content { text-align: center; max-width: 480px; }
    .eyebrow { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1.25rem; }
    h1 { font-family: var(--serif); font-size: clamp(2.5rem, 6vw, 4rem); font-weight: 400; line-height: 1.1; margin-bottom: 1.25rem; }
    p { font-size: 1rem; color: var(--muted); line-height: 1.75; margin-bottom: 2rem; }
    .links { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.75rem 1.5rem; background: var(--text); color: var(--bg); text-decoration: none; font-size: 0.875rem; font-weight: 500; border-radius: 6px; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.8; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); opacity: 1; }
    footer { border-top: 1px solid var(--border); padding: 1.5rem var(--pad); text-align: center; font-size: 0.775rem; color: var(--muted); }
  </style>
</head>
<body>
  <nav><a class="nav-brand" href="/">Bryan Jodon</a></nav>
  <main>
    <div class="content">
      <p class="eyebrow">404</p>
      <h1>Page not found.</h1>
      <p>This page doesn't exist — or it moved. The main site has everything you need.</p>
      <div class="links">
        <a class="btn" href="/">Go home</a>
        <a class="btn btn-ghost" href="/articles/">Read articles</a>
        <a class="btn btn-ghost" href="mailto:bryan@bryanjodon.com">Get in touch</a>
      </div>
    </div>
  </main>
  <footer>&copy; 2026 Bryan Jodon</footer>
</body>
</html>
